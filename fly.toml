# fly.toml app configuration file generated for hockey-pools-api on 2026-03-25T05:20:19Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hockey-pools-api'
primary_region = 'iad'

[build]

[processes]
  app = "node src/index.js"
  cron = "supercronic /app/crontab"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
