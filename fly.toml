# fly.toml app configuration file generated for hockey-pools-api on 2026-03-25T05:20:19Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hockey-pools-api'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[scheduled_machines]]
  name = "cache-players"
  command = "curl http://localhost:3000/v1/players/cache"
  schedule = "0 17 * * *"
